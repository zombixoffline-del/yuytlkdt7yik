name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Install Android SDK (only SDK tools, no NDK)
        run: |
          export ANDROID_SDK_ROOT=/home/runner/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O sdk-tools.zip
          unzip -q sdk-tools.zip
          mkdir -p cmdline-tools
          mv cmdline-tools cmdline-tools/latest || true
          if [ -d "cmdline-tools" ] && [ ! -d "cmdline-tools/latest" ]; then
            mv cmdline-tools cmdline-tools_temp
            mkdir -p cmdline-tools
            mv cmdline-tools_temp cmdline-tools/latest
          fi
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses > /dev/null 2>&1 || true
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;37.0.0" "platform-tools" "platforms;android-30"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          export ANDROID_SDK_ROOT=/home/runner/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          buildozer android debug deploy run

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zombix-APK
          path: bin/*.apk
